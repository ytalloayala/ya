<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Arquivo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #4CAF50;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        #file-name {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Carregar Arquivo</h1>
        
        <div class="upload-area">
            <p>Clique no botão abaixo para selecionar um arquivo</p>
            
            <form id="upload-form">
                <input type="file" id="arquivo" name="arquivo">
                <label for="arquivo" class="btn">Escolher Arquivo</label>
                
                <button type="submit" class="btn">Enviar Arquivo</button>
            </form>
        </div>
        
        <p id="file-name"></p>
    </div>

    <script>
        // Mostra o nome do arquivo selecionado
        const fileInput = document.getElementById('arquivo');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileNameDisplay.textContent = 'Arquivo selecionado: ' + this.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
        });

        // Quando clicar em "Enviar Arquivo" (por enquanto só mostra mensagem)
        document.getElementById('upload-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (fileInput.files.length === 0) {
                alert('Por favor, selecione um arquivo primeiro!');
                return;
            }
            
            alert('Arquivo "' + fileInput.files[0].name + '" enviado com sucesso! 🎉\n\n(No momento ainda não envia de verdade)');
            // Aqui no futuro você vai conectar com o backend
        });
    </script>
</body>
</html>
